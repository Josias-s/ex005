<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f4f4;
            margin: 40px;
        }
    </style>
    <title>formulario</title>
</head>
<body>
    <h1>Formulário</h1>
    <form action="form.php" method="post"autocomplete="on">
        <label for="nome">Nome:</label>
        <input type="text" name="nome"id="nome" placeholder="Digite seu nome"required autocomplete="username"><br>
        <label for="email">E-mail:</label>
        <input type="email" name="email"id="email" placeholder="Digite seu e-mail"required autocomplete="email"><br>
        <label for="senha">Senha:</label>
        <input type="password" name="senha"id="senha" placeholder="Digite sua senha"required autocomplete="current-password" minlength="3" maxlength="12"><br>
        <label for="pais">País:</label>
        <select name="pais" id="pais">
            <option value="">Selecione seu país</option>
            <option value="brasil">Brasil</option>
            <option value="argentina">Argentina</option>
            <option value="chile">Chile</option>
        </select><br>
        <input type="submit" value="Enviar">
        <input type="reset" value="Limpar" >
    </form>


    
</body>
</html>
