<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nubank</title>
</head>
<style>
    body{
        font-family: Arial, Helvetica, sans-serif;
        background-color: #7c38f1;
        margin: 40px;
    }
    form{
        background-color: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
        width: 300px;
        height: 400px;
        margin: auto;
    }
    h1{
        text-align: center;
        color: #7c38f1;
    }
    input{
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 4px;
        box-sizing: border-box;
    }
    #botao:hover{
        background-color: #7c38f1;
        color: white;
        font-weight: bolder;
        transition: 0.5s;
        width: 49%;
        
    
    }
    #botao{
        width: 48%;
        background-color: white;
        border: 2px solid #7b39eef5;
        color: #7c38f1;
        font-weight: bold;
    
        
    }
 
</style>
<body>
    <main>
       
        <form action="form.php" method="post" autocomplete="on">
            
                <h1>Login</h1>
               
                <label for="nome">Usuario:</label>
                <input type="text" name="nome" placeholder="Nome completo" required id="nome"><br><br>
                <label for="senha">Senha:</label>
                <input type="password" name="senha" placeholder="Senha" required id="senha" minlength="3" maxlength="10"><br><br>
                <input type="submit" value="Entrar" id="botao">
                <input type="reset" value="Limpar" id="botao">
            
        </form>
    </main>
    
</body>
</html>
